server {
    server_name chatgptimage2.art www.chatgptimage2.art;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8891;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chatgptimage2.art/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chatgptimage2.art/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.chatgptimage2.art) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = chatgptimage2.art) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name chatgptimage2.art www.chatgptimage2.art;
    return 404; # managed by Certbot
}
